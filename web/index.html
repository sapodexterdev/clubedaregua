<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Clube da Regua - app premium de barbearia e agendamento.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF6B2C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Clube da Regua">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Clube da Regua</title>
  <script>
    window.addEventListener('unhandledrejection', function (event) {
      console.error('CLUBE_DA_REGUA_UNHANDLED', event.reason && (event.reason.stack || event.reason));
    });
    window.addEventListener('error', function (event) {
      console.error('CLUBE_DA_REGUA_ERROR', event.error && (event.error.stack || event.message));
    });
  </script>
</head>
<body>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    async function clearOldFlutterCache() {
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(function (registration) {
          return registration.unregister();
        }));
      }

      if ('caches' in window) {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(function (cacheName) {
          return caches.delete(cacheName);
        }));
      }
    }

    clearOldFlutterCache().finally(function () {
      _flutter.loader.load({
        serviceWorkerSettings: null,
        config: {
          renderer: 'html'
        }
      });
    });
  </script>
</body>
</html>
