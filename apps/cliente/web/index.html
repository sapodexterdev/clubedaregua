<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Clube da Régua - app premium de barbearia e agendamento.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clube da Régua">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Clube da Régua</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000000;
    }

    body {
      position: fixed;
      inset: 0;
    }
  </style>
  <script>
    window.addEventListener('unhandledrejection', function (event) {
      console.error('CLUBE_DA_REGUA_UNHANDLED', event.reason && (event.reason.stack || event.reason));
    });
    window.addEventListener('error', function (event) {
      console.error('CLUBE_DA_REGUA_ERROR', event.error && (event.error.stack || event.message));
    });
  </script>
</head>
<body>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      config: {
        renderer: 'html'
      }
    });
  </script>
</body>
</html>
