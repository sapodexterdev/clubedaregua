<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Clube da Regua - app premium de barbearia e agendamento.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F4F4F4">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Clube da Regua">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Clube da Regua</title>
  <style>
    html,
    body {
      background: #F4F4F4;
      color: #151515;
      font-family: Arial, Helvetica, sans-serif;
      height: 100%;
      margin: 0;
      overflow: hidden;
      width: 100%;
    }

    #boot-status {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 100%;
      justify-content: center;
      text-align: center;
      width: 100%;
    }

    #boot-status strong {
      color: #FF6B2C;
      font-size: 26px;
      font-weight: 900;
    }

    #boot-status span {
      color: #8A8A8A;
      font-size: 14px;
      max-width: 300px;
    }

    #boot-status button {
      background: #FF6B2C;
      border: 0;
      border-radius: 999px;
      color: #FFFFFF;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      margin-top: 8px;
      padding: 14px 22px;
    }
  </style>
</head>
<body>
  <div id="boot-status">
    <strong>Clube da Regua</strong>
    <span id="boot-message">Carregando aplicativo...</span>
    <button id="reload-button" type="button" hidden>Atualizar app</button>
  </div>
  <script>
    const bootMessage = document.getElementById('boot-message');
    const reloadButton = document.getElementById('reload-button');

    function showBootError(message) {
      bootMessage.textContent = message;
      reloadButton.hidden = false;
    }

    reloadButton.addEventListener('click', async () => {
      try {
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map((name) => caches.delete(name)));
        }
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
      } finally {
        window.location.href = '/?refresh=' + Date.now();
      }
    });

    window.addEventListener('error', (event) => {
      showBootError('Erro ao abrir o app. Toque em atualizar app.');
      console.error(event.error || event.message);
    });

    window.addEventListener('unhandledrejection', (event) => {
      showBootError('Erro ao carregar dados. Toque em atualizar app.');
      console.error(event.reason);
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((registrations) => Promise.all(
          registrations.map((registration) => registration.unregister()),
        ))
        .catch(() => {});
    }

    if ('caches' in window) {
      caches.keys()
        .then((cacheNames) => Promise.all(cacheNames.map((name) => caches.delete(name))))
        .catch(() => {});
    }

    setTimeout(() => {
      const flutterReady = document.querySelector('flutter-view, flt-glass-pane');
      if (!flutterReady) {
        showBootError('O app demorou para iniciar. Toque em atualizar app.');
      }
    }, 9000);
  </script>
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
